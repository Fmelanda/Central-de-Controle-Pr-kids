services:
  central_controle:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: central_controle
    restart: unless-stopped
    env_file:
      - .env
    environment:
      NODE_ENV: production
      HOST: 0.0.0.0
      PORT: 3000
      APP_URL: ${APP_URL:-http://localhost:3001}
      TRUST_PROXY: ${TRUST_PROXY:-false}
      COOKIE_SECURE: ${COOKIE_SECURE:-false}
      # Dentro do Docker, localhost seria este próprio container.
      EVOLUTION_API_URL: ${EVOLUTION_API_URL_INTERNAL:-http://evolution_api:8080}
    ports:
      - "3001:3000"
    volumes:
      - central_data:/app/data
    networks:
      - n8n_network
    read_only: true
    tmpfs:
      - /tmp
    cap_drop:
      - ALL
    cap_add:
      - CHOWN
      - SETGID
      - SETUID
    security_opt:
      - no-new-privileges:true
    healthcheck:
      test:
        - CMD
        - node
        - -e
        - "fetch('http://127.0.0.1:3000/api/session').then(r=>{if(!r.ok&&r.status!==401)process.exit(1)}).catch(()=>process.exit(1))"
      interval: 15s
      timeout: 5s
      retries: 5
      start_period: 10s

volumes:
  central_data:
    name: central_controle_data

networks:
  n8n_network:
    external: true
